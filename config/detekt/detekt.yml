build:
  maxIssues: 0
  excludeTags:
    - 'reasoning'
    - 'issue'
  weights:
    # complexity: 2
    # LongParameterList: 1
    # style: 1
    # comments: 1

config:
  validation: true
  warningsAsErrors: false
  checkExhaustiveness: false

complexity:
  active: true
  ComplexCondition:
    active: true
    threshold: 4
  ComplexInterface:
    active: true
    threshold: 10
  ComplexMethod:
    active: true
    threshold: 15
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 6
    constructorThreshold: 7

coroutines:
  active: true

empty-blocks:
  active: true

exceptions:
  active: true

formatting:
  active: true

naming:
  active: true
