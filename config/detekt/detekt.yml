build:
  maxIssues: 0
  weights:
    # complexity: 2

config:
  validation: true
  warningsAsErrors: false
  checkExhaustiveness: false

complexity:
  active: true
  ComplexCondition:
    active: true
    threshold: 5
  ComplexInterface:
    active: true
    threshold: 40
  CyclomaticComplexMethod:
    active: true
    threshold: 100
  LongMethod:
    active: true
    threshold: 1000
  LongParameterList:
    active: true
    functionThreshold: 20
    constructorThreshold: 18
  TooManyFunctions:
    active: true
    thresholdInClasses: 50
    thresholdInInterfaces: 50
  NestedBlockDepth:
    active: true
    threshold: 5

coroutines:
  active: true

performance:
  active: true
  SpreadOperator:
    active: false

empty-blocks:
  active: true
  EmptyCatchBlock:
    active: true
  EmptyFunctionBlock:
    active: true

exceptions:
  active: true
  SwallowedException:
    active: false
  TooGenericExceptionCaught:
    active: false

naming:
  active: true
  FunctionNaming:
    active: false
  MatchingDeclarationName:
    active: false
  ConstructorParameterNaming:
    active: false

style:
  MagicNumber:
    active: false
  MaxLineLength:
    active: false
  WildcardImport:
    active: false
  NewLineAtEndOfFile:
    active: false
  ReturnCount:
    active: true
    max: 8
  UnusedPrivateProperty:
    active: true
  UnusedParameter:
    active: true
  UseCheckOrError:
    active: false
  LoopWithTooManyJumpStatements:
    active: false
